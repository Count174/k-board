name: Oubaitori
options:
  bundleIdPrefix: ru.oubaitori
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
targets:
  Oubaitori:
    type: application
    platform: iOS
    sources:
      - path: Oubaitori
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ru.oubaitori.app
        INFOPLIST_FILE: Oubaitori/Info.plist
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
    info:
      path: Oubaitori/Info.plist
      properties:
        API_BASE_URL: https://o-board.ru/api
        UILaunchScreen: {}
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - oubaitori
